# Spins up an isolated Postgres for running tests locally.
# Matches the same Postgres version used in CI for parity.
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: atlas-postgres-test
    environment:
      POSTGRES_USER: atlas_test
      POSTGRES_PASSWORD: atlas_test
      POSTGRES_DB: atlas_test
    ports:
      - "5433:5432"  # 5433 to avoid clashing with a local dev Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_test -d atlas_test"]
      interval: 2s
      timeout: 5s
      retries: 10
