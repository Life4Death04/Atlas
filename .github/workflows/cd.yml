# ─────────────────────────────────────────────────────────────────────────────
# Atlas CD workflow
#
# Builds the apps/server Docker image on every PR and push to main.
# Publishes to GHCR only on push to main (after CI passes via branch protection).
#
# CI-green gate
# ─────────────────────────────────────────────────────────────────────────────
# This workflow does NOT re-run or wait on CI inside cd.yml. The "CI must pass
# before this workflow publishes" guarantee comes from branch protection on
# `main` (see REQ-8 and docs/cd.md). Configure branch protection before relying
# on this gate:
#   Settings → Branches → Add rule for `main` → Require status checks to pass
#   → select the `test` job from ci.yml.
#
# Workflow permissions note
# ─────────────────────────────────────────────────────────────────────────────
# The `packages: write` permission below is required to push to GHCR.
# If your organisation defaults to read-only workflow permissions, go to:
#   Settings → Actions → General → Workflow permissions → Read and write.
# ─────────────────────────────────────────────────────────────────────────────

name: CD

"on":
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'apps/server/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/cd.yml'
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'apps/server/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/cd.yml'

# Prevent concurrent publishes to GHCR mid-flight.
# cancel-in-progress: false ensures a push to main always finishes publishing.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

# packages: write  — required to push to GHCR (only exercised on push to main)
# contents: read   — required for actions/checkout
permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build (and publish on main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read server semver
        id: ver
        run: |
          v=$(node -p "require('./apps/server/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # REQ-7 literal compliance — pnpm store cache.
      # Functionally redundant with BuildKit pnpm-store mount inside the Dockerfile.
      # Reviewer may request removal during verify.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/atlas-server
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=atlas-server
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build and (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
